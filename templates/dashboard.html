<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASKKPIT — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 360px;
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
      color: #ff5722;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .welcome {
      font-size: 15px;
      color: #888;
      margin-bottom: 30px;
    }

    .welcome span {
      font-weight: 700;
      color: #111;
    }

    .chat-btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: #ff5722;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 14px;
      cursor: pointer;
      border: none;
    }
    .chat-btn:hover { background: #e64a19; }

    .logout-link {
      display: block;
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      margin-top: 6px;
    }
    .logout-link:hover { color: #ff5722; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ASKKPIT</div>
    <p class="welcome">Welcome, <span>{{ request.user.username }}</span> 👋</p>

    <a href="{% url 'chatbot' %}" class="chat-btn">💬 Chat with ASKKPIT</a>

    <a href="{% url 'logout' %}" class="logout-link">Logout</a>
  </div>
</body>
</html>
