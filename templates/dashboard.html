<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Campus AI — CollegeChatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e1726;
    --navy:#13203a;
    --navy-2:#1b2c4f;
    --paper:#f6f3ea;
    --gold:#caa14d;
    --gold-bright:#e8c473;
    --teal:#3f9c8f;
    --glass:rgba(255,255,255,0.06);
    --glass-bd:rgba(255,255,255,0.12);
    --text-dim:#9fb0cc;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(63,156,143,0.18), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(202,161,77,0.15), transparent 45%),
      linear-gradient(160deg, var(--ink), var(--navy) 60%, var(--navy-2));
    min-height:100svh;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:clamp(0px, 3vw, 24px);
    color:var(--paper);
  }

  .app{
    width:min(430px, 100vw);
    max-width:100%;
    height:min(660px, 100svh);
    height:min(660px, 100vh);
    background:linear-gradient(180deg, rgba(19,32,58,0.92), rgba(14,23,38,0.96));
    border:1px solid var(--glass-bd);
    border-radius:clamp(0px, 2vw, 24px);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    backdrop-filter:blur(20px);
    position:relative;
  }

  /* header */
  .header{
    padding:20px 22px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    border-bottom:1px solid var(--glass-bd);
    background:linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    flex-shrink:0;
  }
  .crest{
    width:46px;height:46px;border-radius:14px;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold));
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; font-size:20px; color:var(--ink);
    box-shadow:0 6px 16px rgba(202,161,77,0.35);
    flex-shrink:0;
  }
  .header .title{flex:1;}
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:18px;
    letter-spacing:0.2px;
    color:var(--paper);
  }
  .header .sub{
    display:flex;align-items:center;gap:6px;
    font-size:11.5px;color:var(--text-dim);
    margin-top:3px;
    font-family:'JetBrains Mono',monospace;
  }
  .pulse{
    width:7px;height:7px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 0 0 rgba(63,156,143,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,156,143,0.55);}
    70%{box-shadow:0 0 0 7px rgba(63,156,143,0);}
    100%{box-shadow:0 0 0 0 rgba(63,156,143,0);}
  }

  /* messages */
  .messages{
    flex:1;
    min-height:0;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .messages::-webkit-scrollbar{width:5px;}
  .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:10px;}

  .row{display:flex;gap:10px;align-items:flex-end;animation:rise 0.35s ease;}
  .row.user{flex-direction:row-reverse;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .av{
    width:28px;height:28px;border-radius:9px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  }
  .av.bot{background:linear-gradient(135deg,var(--teal),#2c6e64);color:#eafaf6;}
  .av.user{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:var(--ink);}

  .bubble{
    max-width:74%;
    padding:11px 15px;
    font-size:14px;
    line-height:1.55;
    border-radius:16px;
    position:relative;
  }
  .row.bot .bubble{
    background:var(--glass);
    border:1px solid var(--glass-bd);
    border-bottom-left-radius:5px;
    color:#e9eef7;
  }
  .row.user .bubble{
    background:linear-gradient(135deg, var(--gold-bright), var(--gold));
    color:var(--ink);
    font-weight:500;
    border-bottom-right-radius:5px;
  }
  .stamp{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    color:var(--text-dim);
    margin-top:5px;
    opacity:0.7;
  }
  .row.user .stamp{text-align:right;}

  .typing{
    display:flex;gap:4px;padding:13px 16px;
    background:var(--glass);border:1px solid var(--glass-bd);
    border-radius:16px;border-bottom-left-radius:5px;width:fit-content;
  }
  .typing span{
    width:5px;height:5px;border-radius:50%;background:var(--teal);
    animation:bounce 1.1s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.5;}30%{transform:translateY(-4px);opacity:1;}}

  /* suggestions */
  .suggestions{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:0 20px 16px;
    flex-shrink:0;
  }
  .chip{
    font-family:'Inter',sans-serif;
    font-size:12px;font-weight:500;
    color:var(--gold-bright);
    background:rgba(202,161,77,0.08);
    border:1px solid rgba(202,161,77,0.35);
    padding:7px 13px;border-radius:20px;
    cursor:pointer;
    transition:all 0.2s ease;
    white-space:nowrap;
  }
  .chip:hover{
    background:var(--gold);
    color:var(--ink);
    transform:translateY(-1px);
  }

  /* input */
  .input-bar{
    display:flex;align-items:center;gap:10px;
    padding:14px 16px;
    border-top:1px solid var(--glass-bd);
    background:rgba(255,255,255,0.02);
    flex-shrink:0;
  }
  .input-bar input{
    flex:1;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--glass-bd);
    border-radius:24px;
    padding:11px 17px;
    font-size:14px;
    color:var(--paper);
    outline:none;
    font-family:'Inter',sans-serif;
    transition:border-color 0.2s;
  }
  .input-bar input::placeholder{color:var(--text-dim);}
  .input-bar input:focus{border-color:var(--gold);}

  .send{
    width:42px;height:42px;border-radius:50%;
    border:none;cursor:pointer;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold));
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:transform 0.15s ease;
  }
  .send:hover{transform:scale(1.07);}
  .send:active{transform:scale(0.95);}
  .send svg{width:17px;height:17px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  /* Phones: full-bleed app, no outer padding/rounding */
  @media (max-width:600px){
    body{padding:0;}
    .app{
      width:100vw;
      height:100svh;
      height:100vh;
      border-radius:0;
      border:none;
    }
    .header{padding:max(16px, env(safe-area-inset-top)) 16px 14px;}
    .input-bar{padding-bottom:max(14px, calc(env(safe-area-inset-bottom) + 10px));}
    .bubble{max-width:84%;}
    .suggestions{padding:0 16px 14px;}
  }

  /* Small phones */
  @media (max-width:360px){
    .header h1{font-size:16px;}
    .crest{width:40px;height:40px;font-size:17px;}
    .bubble{font-size:13.5px;}
    .chip{font-size:11px;padding:6px 11px;}
  }

  /* Tablets */
  @media (min-width:601px) and (max-width:900px){
    .app{width:min(480px, 92vw); height:min(700px, 88svh);}
  }

  /* Large desktop screens: roomier card */
  @media (min-width:1400px){
    .app{width:460px; height:720px;}
  }

  /* Landscape phones: cap height so layout doesn't break */
  @media (max-height:480px) and (orientation:landscape){
    .app{height:100vh; height:100svh;}
    .header{padding:10px 16px;}
    .suggestions{padding:0 16px 8px;}
    .messages{padding:12px 16px;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="crest">CC</div>
    <div class="title">
      <h1>Campus AI</h1>
      <div class="sub"><span class="pulse"></span> Online · Admissions Desk</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <div class="chip">Admissions process</div>
    <div class="chip">Courses offered</div>
    <div class="chip">Fee structure</div>
    <div class="chip">Hostel & campus life</div>
  </div>

  <div class="input-bar">
    <input id="userInput" type="text" placeholder="Ask about admissions, courses, fees…" autocomplete="off">
    <button class="send" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
(function(){
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const suggestions = document.getElementById('suggestions');

  // Replace this object with a real fetch() call to your backend / LLM API
  const KB = {
    "admissions process": "Admissions open every June. You'll need your 12th grade marksheet, a valid ID, and your entrance exam score where applicable. Applications close mid-August.",
    "courses offered": "We offer Computer Science, Mechanical Engineering, Business Administration, and Design. Want details on a specific program?",
    "fee structure": "Tuition ranges from $2,000–$6,000 per year depending on the program, with scholarships available for merit and need-based cases.",
    "hostel & campus life": "On-campus hostels, a central library, sports complex, and three cafeterias. Hostel seats are allotted on a first-come basis after admission.",
    "default": "I don't have that on file yet — try rephrasing, or pick one of the topics below."
  };

  function time(){
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addMessage(text, who){
    const row = document.createElement('div');
    row.className = 'row ' + who;
    row.innerHTML = `
      <div class="av ${who}">${who === 'bot' ? 'CC' : 'You'}</div>
      <div>
        <div class="bubble">${text}</div>
        <div class="stamp">${time()}</div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row bot';
    row.id = 'typingRow';
    row.innerHTML = `<div class="av bot">CC</div><div class="typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping(){
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  function reply(text){
    const key = text.trim().toLowerCase();
    return KB[key] || KB.default;
  }

  function handleSend(text){
    if (!text.trim()) return;
    addMessage(text, 'user');
    input.value = '';
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(reply(text), 'bot');
    }, 700 + Math.random()*400);
  }

  sendBtn.addEventListener('click', () => handleSend(input.value));
  input.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(input.value); });
  suggestions.addEventListener('click', e => {
    if (e.target.classList.contains('chip')) handleSend(e.target.textContent);
  });

  // greeting
  addMessage("Hi, I'm Campus AI 🎓 — ask me anything about admissions, courses, fees, or campus life.", 'bot');
})();
</script>

</body>
</html>
