{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; }
    h2 { margin-bottom: 20px; color: #1e3c72; text-align: center; }
    input { width: 100%; padding: 10px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 6px; }
    button { width: 100%; padding: 10px; background: #1e3c72; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2a5298; }
    .error { color: red; font-size: 13px; margin-bottom: 10px; }
    .forgot { text-align: center; margin-top: 12px; }
    .forgot a { color: #1e3c72; font-size: 13px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <input type="text" name="user_id" placeholder="User ID" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="forgot">
      <a href="{% url 'forgot_password' %}">Forgot Password?</a>
    </div>
  </div>
</body>
</html>
